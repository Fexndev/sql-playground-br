<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Playground — Dados Públicos BR</title>
    <meta name="description" content="Pratique SQL com dados reais do Portal da Transparência do governo federal brasileiro. PostgreSQL no browser, zero instalação.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/playground.css">
</head>
<body>

<!-- ── HEADER ── -->
<header class="pg-header">
    <div class="pg-header-inner">
        <div class="pg-logo">
            sql_playground<span class="cursor">_</span>
            <span class="pg-badge">Portal da Transparência</span>
        </div>
        <div class="pg-header-right">
            <button class="pg-theme-toggle" id="themeToggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">🌙</button>
            <span class="pg-status pg-status--loading" id="dbStatus">Carregando...</span>
            <span class="pg-progress">Resolvidos: <strong id="progressCount">0/10</strong></span>
        </div>
    </div>
</header>

<!-- ── LOADING (inline, hidden by JS) ── -->
<div class="pg-loading" id="loading">
    <div class="pg-spinner"></div>
    <p>Inicializando...</p>
</div>

<!-- ── APP ── -->
<div class="pg-app" id="app">

    <!-- Sidebar -->
    <aside class="pg-sidebar">
        <div>
            <div class="pg-sidebar-title">📊 Tabelas disponíveis</div>
            <p class="pg-sidebar-hint">Clique em uma tabela para explorar</p>
            <div id="schemaList"></div>
        </div>

        <hr class="pg-sidebar-divider">

        <div>
            <div class="pg-sidebar-title">🏆 Desafios</div>
            <div id="challengeList"></div>
        </div>
    </aside>

    <!-- Main -->
    <main class="pg-main">

        <!-- Challenge detail -->
        <div class="pg-challenge-detail" id="challengeDetail"></div>

        <!-- Editor -->
        <div class="pg-editor-wrap">
            <div class="pg-editor-label">
                <span>Query SQL</span>
                <div class="pg-editor-actions">
                    <button class="pg-btn-clear" id="btnClear">Limpar script</button>
                    <button class="pg-btn-clear" id="btnClearResults">Limpar resultados</button>
                </div>
            </div>
            <textarea class="pg-editor" id="editor"
                placeholder="SELECT * FROM gastos_governo LIMIT 10;

-- Explore as tabelas na barra lateral
-- ou escolha um desafio pra começar"
                spellcheck="false"></textarea>
            <div class="pg-run-row">
                <button class="pg-btn-run" id="btnRun" disabled>▶ Executar</button>
                <span class="pg-shortcut" id="shortcutHint">Ctrl+Enter</span>
                <span class="pg-time" id="queryTime"></span>
            </div>
        </div>

        <!-- Results -->
        <div class="pg-results" id="results">
            <div class="pg-empty">
                <div class="pg-empty-icon">🔍</div>
                <p>Explore os dados do governo federal</p>
                <small>Escolha um exemplo abaixo ou escreva sua própria query</small>

                <div class="pg-quick-examples" id="quickExamples"></div>
            </div>
        </div>

    </main>
</div>

<!-- Toast -->
<div class="pg-toast" id="toast" role="alert"></div>

<!-- Scripts (NOT modules — all global scope) -->
<script src="js/seed.js"></script>
<script src="js/challenges.js"></script>
<script src="js/app.js"></script>

</body>
</html>
